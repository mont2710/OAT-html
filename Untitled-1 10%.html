<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Alunos</title>
    <style>
        body{font-family:Arial;margin:20px;background:#f0f0f0}
        .container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:5px}
        input,button{width:100%;padding:8px;margin:5px 0;border:1px solid #ccc;border-radius:3px}
        button{background:#007bff;color:#fff;cursor:pointer;border:none}
        .btn-danger{background:#dc3545}
        .student-card{border:1px solid #ddd;padding:10px;margin:10px 0;display:flex;align-items:center;gap:10px}
        .student-card img{width:50px;height:50px;border-radius:50%;object-fit:cover}
        .student-info{flex:1}
        .delete-btn{width:auto;background:#dc3545;padding:5px 10px}
        .btn-group{display:flex;gap:10px;margin:10px 0}
        h2{font-size:18px}
    </style>
</head>
<body>
<div class="container">
    <h1>📚 Cadastro de Alunos</h1>
    
    <form id="studentForm">
        <input type="text" id="name" placeholder="Nome" required>
        <input type="text" id="registration" placeholder="Matrícula" required>
        <input type="file" id="photo" accept="image/*" required>
        <div id="preview"></div>
        <button type="submit">Salvar</button>
    </form>

    <div class="btn-group">
        <button id="clearBtn" class="btn-danger">Limpar Tudo</button>
        <button id="defaultBtn">10 Alunos</button>
    </div>

    <h2>Alunos (<span id="count">0</span>)</h2>
    <div id="studentsList"></div>
</div>

<script>
const KEY='students';
const DEFAULTS=[
    {name:"Aluno um",registration:"2024001",photo:"https://randomuser.me/api/portraits/men/1.jpg"},
    {name:"Aluno Dois",registration:"2024002",photo:"https://randomuser.me/api/portraits/men/2.jpg"},
    {name:"Aluno Tres",registration:"2024003",photo:"https://randomuser.me/api/portraits/men/3.jpg"},
    {name:"Aluno Quatro",registration:"2024004",photo:"https://randomuser.me/api/portraits/men/4.jpg"},
    {name:"Aluno Cinco",registration:"2024005",photo:"https://randomuser.me/api/portraits/men/5.jpg"},
    {name:"Aluno Seis",registration:"2024006",photo:"https://randomuser.me/api/portraits/men/6.jpg"},
    {name:"Aluno Sete",registration:"2024007",photo:"https://randomuser.me/api/portraits/men/7.jpg"},
    {name:"Aluno Oito",registration:"2024008",photo:"https://randomuser.me/api/portraits/men/8.jpg"},
    {name:"Aluno Nove",registration:"2024009",photo:"https://randomuser.me/api/portraits/men/9.jpg"},
    {name:"Aluno Dez",registration:"2024010",photo:"https://randomuser.me/api/portraits/men/10.jpg"}
];

let students=JSON.parse(localStorage.getItem(KEY)||'[]');
if(students.length===0) students=DEFAULTS.map(s=>({...s,id:Date.now()+Math.random(),createdAt:new Date().toISOString()}));
save();

function save(){localStorage.setItem(KEY,JSON.stringify(students));render();}
function render(){
    let list=document.getElementById('studentsList');
    document.getElementById('count').innerText=students.length;
    if(students.length===0){list.innerHTML='<p style="text-align:center;color:#999">Nenhum aluno</p>';return;}
    list.innerHTML=students.map(s=>`
        <div class="student-card">
            <img src="${s.photo}">
            <div class="student-info">
                <strong>${s.name}</strong><br>
                ${s.registration}<br>
                <small>${new Date(s.createdAt).toLocaleDateString()}</small>
            </div>
            <button class="delete-btn" onclick="deleteStudent(${s.id})">X</button>
        </div>
    `).join('');
}

function deleteStudent(id){if(confirm('Remover?')){students=students.filter(s=>s.id!==id);save();}}

document.getElementById('studentForm').onsubmit=async(e)=>{
    e.preventDefault();
    let name=document.getElementById('name').value.trim();
    let reg=document.getElementById('registration').value.trim();
    let file=document.getElementById('photo').files[0];
    if(!name||!reg||!file){alert('Preencha tudo');return;}
    let reader=new FileReader();
    reader.onload=ev=>{
        students.unshift({id:Date.now(),name,registration:reg,photo:ev.target.result,createdAt:new Date().toISOString()});
        save();
        document.getElementById('studentForm').reset();
        document.getElementById('preview').innerHTML='';
        alert('Salvo!');
    };
    reader.readAsDataURL(file);
};

document.getElementById('clearBtn').onclick=()=>{if(confirm('Limpar tudo?')){students=[];save();alert('Removidos!');}};
document.getElementById('defaultBtn').onclick=()=>{if(confirm('Carregar 10 alunos?')){students=DEFAULTS.map(s=>({...s,id:Date.now()+Math.random(),createdAt:new Date().toISOString()}));save();alert('Carregados!');}};
document.getElementById('photo').onchange=e=>{let f=e.target.files[0];if(f){let r=new FileReader();r.onload=ev=>document.getElementById('preview').innerHTML=`<img src="${ev.target.result}" style="width:80px;height:80px;border-radius:50%">`;r.readAsDataURL(f);}};
</script>
</body>
</html>
