<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Documentos</title>
    <style>
        body{font-family:Arial;padding:20px;background:#f0f0f0}
        .container{max-width:800px;margin:auto}
        .card{background:#fff;padding:15px;border-radius:8px;margin-bottom:15px}
        input,textarea{width:100%;padding:8px;margin:5px 0;border:1px solid #ddd;border-radius:4px}
        button{padding:8px;background:#007bff;color:#fff;border:none;border-radius:4px;cursor:pointer}
        .doc{border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:5px}
        .flex{display:flex;justify-content:space-between;align-items:center}
        .preview img,.preview iframe{max-width:100px;max-height:100px}
        .badge{font-size:11px;padding:2px 6px;border-radius:3px;background:#28a745;color:#fff}
        .badge.pdf{background:#dc3545}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999}
        .modal.active{display:flex;justify-content:center;align-items:center}
        .modal-content{background:#fff;border-radius:8px;max-width:90%}
    </style>
</head>
<body>
<div class="container">
    <h1>📄 Documentos</h1>
    <div class="card">
        <form id="form">
            <input type="text" id="titulo" placeholder="Título" required>
            <textarea id="desc" placeholder="Descrição"></textarea>
            <input type="file" id="arquivo" accept=".pdf,image/*" required>
            <div id="prev" class="preview"></div>
            <button type="submit">Salvar</button>
        </form>
    </div>
    <div class="card">
        <div class="flex"><h3>Lista (<span id="total">0</span>)</h3><button id="limpar" style="background:#dc3545">Limpar</button></div>
        <div id="lista"></div>
    </div>
</div>
<div id="modal" class="modal"><div class="modal-content"><div class="flex" style="padding:10px"><h3 id="mTitulo"></h3><span onclick="fechar()" style="cursor:pointer">&times;</span></div><div id="mBody" style="padding:15px"></div></div></div>

<script>
const K='docs';
let docs=JSON.parse(localStorage.getItem(K)||'[]');
if(docs.length===0) docs=[
    {id:1,titulo:"Edital",desc:"Processo seletivo",tipo:"pdf",dados:"",arquivo:"edital.pdf"},
    {id:2,titulo:"Calendário",desc:"Provas",tipo:"pdf",dados:"",arquivo:"calendario.pdf"},
    {id:3,titulo:"Regimento",desc:"Normas",tipo:"pdf",dados:"",arquivo:"regimento.pdf"}
].map(x=>({...x,id:Date.now()+Math.random(),criado:new Date().toISOString()}));
salvar();

function salvar(){localStorage.setItem(K,JSON.stringify(docs));listar();}
function tipo(f){return f.type==='application/pdf'?'pdf':'img';}

document.getElementById('arquivo').onchange=e=>{
    let f=e.target.files[0];
    if(!f)return;
    let r=new FileReader();
    let p=document.getElementById('prev');
    r.onload=ev=>p.innerHTML=f.type.startsWith('image')?`<img src="${ev.target.result}">`:`<iframe src="${ev.target.result}"></iframe>`;
    r.readAsDataURL(f);
};

document.getElementById('form').onsubmit=e=>{
    e.preventDefault();
    let t=document.getElementById('titulo').value.trim();
    let d=document.getElementById('desc').value.trim();
    let f=document.getElementById('arquivo').files[0];
    if(!t||!f)return alert('Preencha tudo');
    let r=new FileReader();
    r.onload=ev=>{
        docs.unshift({id:Date.now(),titulo:t,desc:d||'--',tipo:tipo(f),dados:ev.target.result,arquivo:f.name,tamanho:f.size,criado:new Date().toISOString()});
        salvar();
        document.getElementById('form').reset();
        document.getElementById('prev').innerHTML='';
        alert('Ok');
    };
    r.readAsDataURL(f);
};

function listar(){
    let div=document.getElementById('lista');
    document.getElementById('total').innerText=docs.length;
    if(!docs.length){div.innerHTML='<p style="text-align:center;color:#999">Vazio</p>';return;}
    div.innerHTML=docs.map(d=>`
        <div class="doc">
            <div class="flex"><b>${esc(d.titulo)}</b><span class="badge ${d.tipo}">${d.tipo.toUpperCase()}</span></div>
            <p style="margin:5px 0;font-size:12px">${esc(d.desc)}</p>
            <div class="preview">${d.tipo==='img'?`<img src="${d.dados}" onclick="ver(${d.id})">`:`<iframe src="${d.dados}" onclick="ver(${d.id})"></iframe>`}</div>
            <div class="flex" style="margin-top:5px"><small>${new Date(d.criado).toLocaleDateString()}</small><button onclick="remover(${d.id})" style="background:#dc3545;padding:4px 8px">X</button></div>
        </div>
    `).join('');
}

function ver(id){
    let d=docs.find(x=>x.id===id);
    if(!d)return;
    document.getElementById('mTitulo').innerText=d.titulo;
    document.getElementById('mBody').innerHTML=d.tipo==='img'?`<img src="${d.dados}" style="max-width:100%">`:`<iframe src="${d.dados}" style="width:70vw;height:70vh"></iframe>`;
    document.getElementById('modal').classList.add('active');
}

function remover(id){if(confirm('Remover?')){docs=docs.filter(x=>x.id!==id);salvar();}}
function fechar(){document.getElementById('modal').classList.remove('active');}
function esc(t){let d=document.createElement('div');d.textContent=t;return d.innerHTML;}

document.getElementById('limpar').onclick=()=>{if(confirm('Limpar tudo?')){docs=[];salvar();}};
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))fechar();};
listar();
</script>
</body>
</html>
